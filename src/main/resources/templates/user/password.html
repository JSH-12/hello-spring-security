<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
        .form-card { border: none; border-radius: 16px; }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/home}">홈</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" th:href="@{/products}">상품 목록</a>
                </li>
            </ul>

            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container" style="max-width: 640px;">

    <div class="page-header mb-4">
        <h4 class="fw-bold mb-0">비밀번호 변경</h4>
        <small class="text-muted">현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</small>
    </div>

    <div th:if="${errors}" class="alert alert-danger">
        <strong>입력값을 확인하세요.</strong>
        <ul class="mb-0 mt-2">
            <li th:each="error : ${errors}" th:text="${error}"></li>
        </ul>
    </div>

    <div class="card form-card shadow-sm">
        <div class="card-body p-4">

            <form th:action="@{/user/password}"
                  th:object="${passwordChangeDto}"
                  method="post">

                <div class="mb-3">
                    <label for="currentPassword" class="form-label fw-semibold">현재 비밀번호</label>
                    <input type="password"
                           id="currentPassword"
                           th:field="*{currentPassword}"
                           class="form-control"
                           placeholder="현재 비밀번호를 입력하세요.">
                </div>

                <div class="mb-3">
                    <label for="newPassword" class="form-label fw-semibold">새 비밀번호</label>
                    <input type="password"
                           id="newPassword"
                           th:field="*{newPassword}"
                           class="form-control"
                           placeholder="8자 이상 입력하세요.">
                </div>

                <div class="mb-4">
                    <label for="confirmPassword" class="form-label fw-semibold">새 비밀번호 확인</label>
                    <input type="password"
                           id="confirmPassword"
                           th:field="*{confirmPassword}"
                           class="form-control"
                           placeholder="새 비밀번호를 다시 입력하세요.">
                </div>

                <div class="d-flex justify-content-end gap-2">
                    <a th:href="@{/home}" class="btn btn-outline-secondary">취소</a>
                    <button type="submit" class="btn btn-primary">비밀번호 변경</button>
                </div>

            </form>

        </div>
    </div>

</div>

<div th:replace="~{fragments/footer :: practiceFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
